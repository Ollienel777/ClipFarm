name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --workspace=web
      - run: npm run lint --workspace=web
      - run: npm run typecheck --workspace=web

  api:
    name: API (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check api/
      - run: mypy api/app --ignore-missing-imports
